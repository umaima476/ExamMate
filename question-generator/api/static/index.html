<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Question Generator</title>
    <link rel="stylesheet" href="api/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Course Content</h3>
                <p>Add New Content</p>
                <!-- Upload logic strictly in Sidebar -->
                <div id="drop-zone" class="drop-zone sidebar-upload">
                    <div class="drop-zone-content">
                        <p>Click or Drag</p>
                        <small>PDF/PPTX</small>
                    </div>
                    <input type="file" id="file-input" accept=".pdf, .pptx" hidden>
                </div>

                <div id="sidebar-upload-actions" style="display: none; margin-top: 10px;">
                    <p id="sidebar-file-name" style="font-size: 0.8rem; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis;"></p>
                    <button id="upload-btn" class="btn-primary" style="width: 100%; padding: 8px;">Upload to Library</button>
                </div>
            </div>
            
            <nav class="library-section">
                <p class="section-label">Your Library</p>
                <ul id="file-list">
                    <!-- Files injected here -->
                </ul>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <div class="container">
                <header>
                    <h1>AI Question <span>Generator</span></h1>
                    <p id="status-text">No content selected from library</p>
                </header>

                <section class="workspace-card" id="main-workspace">
                    <!-- Placeholder State -->
                    <div id="empty-state" style="text-align: center; padding: 40px;">
                        <p style="color: #6b7280;">Please select a file from the sidebar to configure your quiz.</p>
                    </div>

                    <!-- Step 2: Quiz Config (Hidden until selection) -->
                    <div id="quiz-config-container" style="display: none;">
                        <div class="quiz-config-card">
                            <h3 id="active-file-display" style="margin-bottom: 15px; color: #4f46e5;"></h3>
                            <div class="input-group">
                                <label for="mcq-count">Number of MCQs</label>
                                <input type="number" id="mcq-count" min="0" max="20" value="5">
                            </div>
                            <div class="input-group">
                                <label for="subjective-count">Number of Subjective Questions</label>
                                <input type="number" id="subjective-count" min="0" max="10" value="2">
                            </div>
                        </div>
                        <button id="generate-btn" class="btn-primary full-width">Generate Quiz</button>
                    </div>

                    <!-- Step 3: Quiz Results -->
                    <div id="quiz-container" style="display: none;">
                        <div class="results-header">
                            <h2>Course Quiz</h2>
                            <div class="divider"></div>
                        </div>
                        <div id="questions-list"></div>
                        <button id="submit-quiz-btn" class="btn-submit">Check Answers</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="api/static/script.js" defer></script>
</body>
</html>
